<!DOCTYPE html>
<html>
<head>
    <title>詳細</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 65%;
        }
        div {
            display: flex;
            align-items: center;
            gap: 20px;
            height: 15vh;
            font-size: larger;
        }
        label {
            flex: 1;
            text-align: center;
            height: 100%;
            position: relative;
            top: 25%;
            /* transform: translateY(25%); */
        }
        input {
            flex: 2;
            height: 100%;
            font-size: large;
        }
        button {
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            background-color: #f0f0f0;
            cursor: pointer;
            font-size: large;
            width: 50%;
            height: 15vh;
        }
        button:hover {
            background-color: #e0e0e0;
        }
        a {
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>
    <h1>詳細</h1>
    <form hx-put="{{ file_stem }}" hx-target="this" hx-swap="outerHTML">
        {% for field_name, field_info in fields %}
        <div>
            <label>{{ field_info.label }}:</label>
            <input type="text" name="{{ field_name }}" value="{{ field_info.value }}">
        </div>
        {% endfor %}
        <button type="submit">修正</button>
        <a href="/">戻る</a>
    </form>
</body>
</html>
