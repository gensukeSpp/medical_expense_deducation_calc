description = "Check code for violations of the Single Responsibility Principle (SRP)"
prompt = """
あなたは、クリーンコードとオブジェクト指向設計の専門家です。
与えられたコードに対して、「単一責任の原則 (Single Responsibility Principle - SRP)」の観点から厳格なレビューを行ってください。

以下のステップで分析してください：
1. **責務の特定**: そのクラスや関数が、現時点で担っている「変更する理由」をすべて列挙してください。
2. **SRP 違反の特定**: 2つ以上の独立した責務を担っている箇所を指摘してください。
3. **改善案の提示**: 各責務をどのように分離（抽出、委譲、クラス分割など）すべきか、具体的なコード例を交えて提案してください。

レビュー対象のファイル:
@{{{args}}}

レビュー結果は、`.gemini/reviews/` に保存してくだい。
"""
